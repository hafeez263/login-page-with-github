<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    
    <link rel="stylesheet" href="1.css">
    <link rel="stylesheet" href="2.css">
   
</head>
<body>

<div class="center-container">
    <form>
        <h2 style="text-align: center; color : white;">Login Form</h2>
        
        <div class="container">
            <label for="Uname" style="color: white;"><b>Username</b></label>
            <input type="text" placeholder="Enter UserName" name="uname">

           <label for="psw" style="color: white;"><b>Password</b></label>
            <input type="password" placeholder="Enter Password" name="psw"> 
            
            <button type="submit">Login</button>  
            <label>
                <input type="checkbox" checked="checked" name="remember" id="remember">
                <label for="remember" style="color: white;">Remember me</label>

            </label>
        </div>

        <div class="container">
            <button type="button" class="cancelbtn">Cancel</button>
            <span class="psw"; style="color: white;"> <a href="#">Forgotpassword?</a></span>
        </div>
    </form>
</div>

</body>
</html>
